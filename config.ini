# ══════════════════════════════════════════════════
#  策略参数配置 — 动态网格交易策略 V2.1
#  只包含文档中标注「✅ 可配置」的策略参数
# ══════════════════════════════════════════════════

[timeframe]
# K线周期：1m 3m 5m 15m 30m 1h 2h 4h 6h 8h 12h 1d
interval = 1m

[rsi]
# RSI 计算周期
period = 14

# 背离深度阈值：前次超卖RSI最低值低于此值时视为「深度超卖」，不判断价格背离
divergence_depth = 10

# 二次信号有效K线数：两次超卖间隔超过此值则重置为首次信号
second_signal_valid_bars = 100


[atr]
# ATR 计算周期
period = 14

# ATR 突变倍数：当前ATR > 前20根均值 × 此倍数时触发保护
spike_multiplier = 3

[grid]
# 第一单距现价系数：第一单价格 = 当前价 ± coeff × ATR
first_order_coeff = 0.2

# 网格基础间距系数：相邻挂单间距 = coeff × ATR
# 1m图建议 0.2（6单全在1.8 ATR范围内），1h图可用 0.5~1.0
spacing_coeff = 0.2

[risk]
# 最大持仓比例：已用保证金占当前本金上限（1.0 = 100%）
max_position_ratio = 1.0

# 止盈金额（USDT）：持仓总浮盈达到此金额即止盈，0 = 不启用
take_profit_usdt = 20

# 止盈比例（本金百分比）：浮盈达到当前本金此比例即止盈，0 = 不启用
# 与 take_profit_usdt 同时设置时，任一条件满足即触发
# 示例：0.02 表示浮盈达到本金2%时止盈
take_profit_pct = 0

# 单次策略止损：本轮浮亏超过当前本金此比例触发（0.20 = 20%）
single_strategy_stop_loss = 0.3

# 全局账户止损：累计总亏损超过初始本金此比例触发
# 注意：必须大于 single_strategy_stop_loss
global_stop_loss = 0.5

# 最低下单机会次数：确保全局止损触发前至少有此次数的开仓机会
# 值越大 → 每次仓位越小 → 更保守
min_trade_opportunities = 1000

[contract]
# 杠杆倍数（用户输入）
leverage = 5
