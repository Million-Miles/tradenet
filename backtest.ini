# ══════════════════════════════════════════════════
#  回测参数配置 — 动态网格交易策略 V2.1
#  数据来源、模拟参数、合约精度、输出设置
# ══════════════════════════════════════════════════

[data]
# 数据来源：binance（自动下载）或 csv（本地文件）
source = binance

# 币安数据参数（source = binance 时生效）
symbol = BTCUSDT
start  = 2024-01-1
end    = 2024-06-1

# 本地CSV路径（source = csv 时生效）
csv_path = data/BTCUSDT_1m.csv

[account]
# 初始本金（USDT）
initial_capital = 10000

[simulation]
# 手续费率（吃单，币安合约默认 0.05%）
commission_rate = 0.0005

# 市价单滑点（0.0002 = 0.02%）
slippage_rate = 0.0002

[contract_spec]
# 每张合约面值（USDT永续合约填 1）
contract_value = 1.0

# 最小下单数量步长（BTCUSDT = 0.001 BTC）
min_qty_step = 0.001

# 价格最小精度（BTCUSDT = 0.1 USDT）
price_tick = 0.1

# ATR突变均值回溯K线数（前N根ATR均值用于突变判断）
atr_spike_lookback = 20

[output]
# 输出文件路径（留空则不输出该文件）
trades = trades.csv
equity = equity.csv
logs   =
